name: Deploy Spring Boot App

on:
  workflow_dispatch:
  # 자동 실행 설정
#  pull_request:
#    branches:
#      - 이호건

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 이미 만들어진 액션 사용

      - name: Set up JDK 17
        uses: actions/setup-java@v5  # 이미 만들어진 액션 사용
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile and test with Gradle
        run: ./gradlew test

      - name: Build Docker image
        run: docker build -t discodeit:latest .

      # 깃헙 해시 7자를 태그로 사용
      - name: Set Github SHA environment variable for tagging
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 태그 중복 설정
      # run 안에 주석쓰면 안됨
      - name: Tag Docker image
        run: |
          docker tag discodeit:latest ${{ secrets.ECR_REPOSITORY_URI }}:${{ env.SHORT_SHA }}
          docker tag discodeit:latest ${{ secrets.ECR_REPOSITORY_URI }}:latest

      # 접속 정보 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 도커 이미지 푸시
      - name: Push Docker image to ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:${{ env.SHORT_SHA }}
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest

      - name: Download task definition template
        run: |
          aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION }} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          # 컨테이너 이름 (task 정의에 있는 이름)
          container-name: discodeit-app
          image: ${{ secrets.ECR_REPOSITORY_URI }}:${{ env.SHORT_SHA }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          # 서비스 이름
          service: ${{ secrets.ECS_SERVICE }}
          # 클러스터 이름
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # 검증
      - name: Verify deployment status
        run: |
          echo "Verifying deployment..."
          aws ecs describe-services --cluster ${{ secrets.ECS_CLUSTER }} --services ${{ secrets.ECS_SERVICE }}
          echo "Deployment seems stable."
