version: '3.8'

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: discodeit-reverse-proxy
    ports:
      - "3000:80"
    depends_on:
      - app
    volumes:
      # 1) nginx 설정 파일 (아래 nginx.conf 참고)
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 2) 프론트 빌드 결과를 정적 서빙 경로로 마운트 (경로는 너 프로젝트에 맞게 조정)
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - edge

  app:
    image: discodeit:local
    build:
      context: .
      dockerfile: Dockerfile
#    container_name: discodeit
    # ✅ ports 제거: 외부에서 app 직접 접근 금지
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/discodeit
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}

      # ✅ Redis / Kafka 접속 추가 (서비스 이름으로)
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=broker:29092

      - STORAGE_TYPE=s3
      - STORAGE_LOCAL_ROOT_PATH=.discodeit/storage
      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_PRESIGNED_URL_EXPIRATION=600
    depends_on:
      - db
      - redis
      - broker
    volumes:
      - binary-content-storage:/app/.discodeit/storage
    networks:
      - edge
      - internal

  db:
    image: postgres:16-alpine
    container_name: discodeit-db
    environment:
      - POSTGRES_DB=discodeit
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - internal

volumes:
  postgres-data:
  binary-content-storage:

networks:
  edge:
  internal:
    internal: true