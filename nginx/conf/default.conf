# HTTP에서 HTTPS로 리다이렉션
server {
    listen 80;
    server_name localhost;

    # 1. /api/* 요청 -> 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8080; # backend는 docker-compose 서비스 이름
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. /ws/* 요청 -> 백엔드 웹소켓 처리 (중요: 업그레이드 헤더 필요)
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 3. 그 외 모든 요청 -> 정적 리소스(프론트엔드) 서빙
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; # SPA(React/Vue) 라우팅 대응
    }

}
