upstream discodeit_server {
   server app:8080;
}

server {
   listen 80;
   server_name localhost;
   return 301 https://$host$request_uri;
}

server {
   listen 443 ssl;
   listen [::]:443 ssl;
   http2 on;
   server_name localhost;

   ssl_certificate /etc/nginx/certs/localhost+2.pem;
   ssl_certificate_key /etc/nginx/certs/localhost+2-key.pem;

   ssl_session_cache shared:SSL:10m; # 세션 캐시 설정
   ssl_session_timeout 1d;           # 세션 유지 시간
   ssl_session_tickets off;         # 세션 티켓 비활성화
   ssl_protocols TLSv1.3;           # 지원 프로토콜 설정
   ssl_prefer_server_ciphers off;    # 서버 암호화 방식 우선 설정

   proxy_connect_timeout 60s;
   proxy_send_timeout 60s;
   proxy_read_timeout 60s;

   include /etc/nginx/mime.types;

   # API 요청
   location /api/ {
       proxy_pass http://discodeit_server;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

       # 인증 헤더 전달
       proxy_set_header Authorization $http_authorization;

       proxy_set_header X-Forwarded-Proto $scheme;
   }

   # WebSocket 요청
   location /ws/ {
       proxy_pass http://discodeit_server;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "Upgrade";
       proxy_set_header Host $host;
   }

   # 정적 리소스 서빙
   location / {
       root /usr/share/nginx/html;
       index index.html index.htm;
       try_files $uri $uri/ /index.html;
   }
}
