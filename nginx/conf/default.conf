upstream backend_servers {
    ip_hash; # 로드 밸런싱 전략
    server backend:8080; # 도커 DNS가 알아서 돌아가며 IP를 줌 (Round Robin)
}

server {
    listen 80;
    server_name localhost;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # SSE 설정
    location ^~ /api/sse {
        proxy_pass http://backend_servers;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;

        add_header X-Upstream-Server $upstream_addr; # 실제 처리한 서버 IP를 헤더에 추가
    }

    # 1. /api/* 요청 -> 백엔드로 프록시
    location ^~ /api/ {
        proxy_pass http://backend_servers;
        add_header X-Upstream-Server $upstream_addr;
    }

    # 2. /ws/* 요청 -> 백엔드 웹소켓 처리 (업그레이드 헤더 필요)
    location ^~ /ws/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_read_timeout 3600s; # 웹소켓 타임아웃 방지
        proxy_send_timeout 3600s;

        add_header X-Upstream-Server $upstream_addr;
    }

    # 3. 그 외 모든 요청 -> 정적 리소스(프론트엔드) 서빙
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; # SPA(React/Vue) 라우팅 대응
    }

}
