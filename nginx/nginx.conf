resolver 127.0.0.11 valid=10s;

upstream backend_round_robin {
    server backend:80;
}

upstream backend_least_conn {
    least_conn;
    server backend:80;
}

upstream backend_ip_hash {
    ip_hash;
    server backend:80;
}

upstream backend_weighted {
    server backend:80 weight=3;
    server backend:80 weight=1;
}

server {
    listen 80;

    location ^~ /api/sse {
        proxy_pass http://backend_least_conn;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Upstream-Server $upstream_addr;
    }

    location ^~ /api/weighted/ {
        proxy_pass http://backend_weighted;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Upstream-Server $upstream_addr;
    }

    location /api/ {
        proxy_pass http://backend_round_robin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Upstream-Server $upstream_addr;
    }

    location /ws/ {
        proxy_pass http://backend_ip_hash;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Upstream-Server $upstream_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
