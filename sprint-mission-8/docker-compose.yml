#version: "3.9"

services:
  postgres-db:
    image: postgres:17-alpine
    container_name: discodeit-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${SPRING_DATASOURCE_DB_NAME}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit-app
    restart: unless-stopped

    depends_on:
      - postgres-db

    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${SPRING_DATASOURCE_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # 🔽 BinaryContentStorage / S3 관련 설정들
      STORAGE_TYPE: ${STORAGE_TYPE:-local}                       # local or s3
      STORAGE_LOCAL_ROOT_PATH: ${STORAGE_LOCAL_ROOT_PATH:-/app/binary-storage}

      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PRESIGNED_URL_EXPIRATION: ${AWS_S3_PRESIGNED_URL_EXPIRATION:-600}

    ports:
      - "8081:80"

    volumes:
      # BinaryContentStorage 데이터 영구 보존 (local일 때 사용)
      - binary-content:/app/binary-storage

volumes:
  pgdata:
  binary-content: