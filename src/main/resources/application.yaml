spring:
  profiles:
    active:
      - dev
  application:
    name: discodeit
  messages:
    basename: messages
    encoding: UTF-8
  servlet:
    multipart:
      maxFileSize: 10MB
      maxRequestSize: 50MB
  datasource:
    driver-class-name: org.postgresql.Driver
    # env 환경변수값이 자동 매핑
    # SPRING_DATASOURCE_URL
    # SPRING_DATASOURCE_USERNAME
    # SPRING_DATASOURCE_PASSWORD
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false


info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.5.5
    ddl-auto: validate
    storage:
      type: local
      root-path: .discodeit/storage
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health,loggers,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

discodeit:
  storage:
    type: local
    root-path: .discodeit/storage
