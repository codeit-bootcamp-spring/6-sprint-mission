spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: true


logging:
  level:
    org:
      hibernate:
        sql: DEBUG
        orm:
          jdbc:
            binder: TRACE
