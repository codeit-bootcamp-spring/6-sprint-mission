discodeit:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ${FILE_UPLOAD_DIR:./uploads/}
    s3:
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}
spring:
  application:
    name: discodeit
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/discodeit}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL}
  cloud:
    aws:
      credentials:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
      region:
        static: ${ap-northeast-2:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET}

code:
  repository:
    type: file

logging:
    level:
        root: INFO

server:
  port: 80





