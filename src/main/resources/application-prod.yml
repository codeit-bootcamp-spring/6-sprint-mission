discodeit:
  storage:
    type: ${STORAGE_TYPE}
    local:
      root-path: ${FILE_UPLOAD_DIR:./uploads/}
    s3:
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}
spring:
  application:
    name: discodeit
  cache:
    type: caffeine
    caffeine:
      spec:
        recordStats
  config:
    import: optional:file:.env
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/discodeit}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: discodeit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  boot:
    #admin:
      #client:
        #url: ${SPRING_BOOT_ADMIN_CLIENT_URL}
  cloud:
    aws:
      credentials:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
      region:
        static: ${ap-northeast-2:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET}

code:
  repository:
    type: file

logging:
    level:
        root: INFO

server:
  port: 80

security:
  key:
    remember-me: ${SECURITY_KEY_REMEMBER_ME:prod-remember-me-key}
  login: jwt

jwt:
  access-token:
    secret: ${JWT_ACCESS_TOKEN_SECRET}
    expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token:
    secret: ${JWT_REFRESH_TOKEN_SECRET}
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  issuer: ${JWT_ISSUER:discodeit}





