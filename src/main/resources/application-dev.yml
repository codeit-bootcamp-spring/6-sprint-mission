discodeit:
  storage:
    type: ${STORAGE_TYPE}
    local:
      root-path: C:\\spring\\codeit-bootcamp-spring\\6-sprint-mission\\src\\main\\resources\\data\\files\\
    s3:
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}
spring:
  application:
    name: discodeit
  cache:
    type: caffeine
    caffeine:
      spec:
        recordStats
  config:
    import: optional:file:.env
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:discodeit-db
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: discodeit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  boot:
    #admin:
      #client:
        #url: http://localhost:9090
  cloud:
    aws:
      credentials:
        access-key: ${AWS_S3_ACCESS_KEY}
        secret-key: ${AWS_S3_SECRET_KEY}
      region:
        static: ${ap-northeast-2:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET}
code:
  repository:
    type: file
logging:
    level:
        root: INFO
        com.codeit: DEBUG
server:
  port: 8081
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: info,health,metrics,loggers
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Discodeit
    version: 1.7.0
    java:
      version: 17
    spring:
      boot:
        version: 3.4.0
    config:
      datasource:
        url: ${spring.datasource.url}
        driver-class-name: ${spring.datasource.driver-class-name}
      jpa:
        hibernate:
          ddl-auto: ${spring.jpa.hibernate.ddl-auto}
      storage:
        type: ${discodeit.storage.type}
        path: ${discodeit.storage.local.root-path}
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB

security:
  key:
    remember-me: ${SECURITY_KEY_REMEMBER_ME:dev-remember-me-key}
  login: jwt

jwt:
  access-token:
    secret: ${JWT_ACCESS_TOKEN_SECRET}
    expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token:
    secret: ${JWT_REFRESH_TOKEN_SECRET}
    expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  issuer: ${JWT_ISSUER:discodeit}



