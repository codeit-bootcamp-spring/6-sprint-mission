spring:
  application:
    name: discodeit

  profiles:
    active: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none # (create, create-drop, update, validate 등 사용 가능)
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  level:
    root: info
    org.hibernate.SQL: debug # JDBC 관련 로그를 DEBUG 레벨로 출력
    # SQL 파라미터를 출력
    org.hibernate.orm.jdbc.bind: trace

discodeit:
  storage:
    type: ${STORAGE_TYPE:local} # local | s3 (기본값: local)
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}
    s3:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
      region: ${AWS_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600} # (기본값: 10분)

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,loggers"

info:
  application:
    name: "Discodeit"
    version: 1.7.0

  environment:
    java-version: "17"
    spring-boot-version: "3.4.0"

    settings:
      datasource:
        url: "${spring.datasource.url}"
        driver: "${spring.datasource.driver-class-name}"
      jpa:
        ddl-auto: "${spring.jpa.hibernate.ddl-auto}"
      storage:
        type: "${discodeit.storage.type}"
        path: "${discodeit.storage.path}"
      multipart:
        max-file-size: "${spring.servlet.multipart.max-file-size}"
        max-request-size: "${spring.servlet.multipart.max-request-size}"

  author:
    name: "Discodeit"